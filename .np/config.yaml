site:
  id: np-template-docs
  base_url: "http://127.0.0.1:8080/" # local fallback; CI injects the GitHub Pages URL automatically
  media_base_url: "http://127.0.0.1:8080/media/" # local fallback; CI injects the GitHub Pages media URL automatically
  title: "Notepub Docs Template"
  description: "Template repository for documentation websites powered by Notepub."
  default_og_image: "/assets/notepub.jpg"
  analytics:
    enabled: false
    provider: "yandex_metrika"
    yandex_counter_id: ""

runtime:
  mode: "auto" # auto|dev|prod
  dev:
    base_url: "http://127.0.0.1:8080/"
    media_base_url: "http://127.0.0.1:8080/media/"
  # Production URLs are normally inferred in GitHub Actions.
  # Add a root CNAME file for a custom domain, or set NOTEPUB_BASE_URL / NOTEPUB_MEDIA_BASE_URL.
content:
  source: "local"
  local_dir: "../content"
paths:
  file_root: ./.notepub
  artifacts_dir: ./.notepub/artifacts
  snapshot_file: ./.notepub/snapshot/objects.json
  cache_root: ./.notepub/cache
theme:
  dir: "./.np"
  name: "theme"
  templates_subdir: "templates"
  assets_subdir: "assets"
rules_path: "./.np/rules.yaml"
server:
  listen: "127.0.0.1:8080"
cache:
  html_ttl_seconds: 600
  stale_if_error_seconds: 604800
